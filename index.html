<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Поздравление</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff9f;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* Кнопка */
button {
  padding: 20px 40px;
  font-size: 24px;
  background: black;
  color: #00ff9f;
  border: 2px solid #00ff9f;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #00ff9f;
  color: black;
}

/* Текст */
#text {
  display: none;
  font-size: 28px;
  text-align: center;
  white-space: pre-line;
}

/* Мигание курсора */
.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff9f;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}
</style>

</head>

<body>

<button onclick="start()">НАЖМИ</button>

<div id="text"></div>

<script>
const message = 
`С ДНЕМ РОЖДЕНИЯ 💻

Ты — настоящий программист.
Пусть код работает с первого раза.

Баги обходят стороной,
а зарплата растет как stack overflow 🚀`;

let i = 0;

function start() {
  document.querySelector("button").style.display = "none";
  const textBlock = document.getElementById("text");
  textBlock.style.display = "block";

  typeWriter();
}

function typeWriter() {
  const textBlock = document.getElementById("text");

  if (i < message.length) {
    textBlock.innerHTML =
      message.substring(0, i + 1) +
      '<span class="cursor"></span>';

    i++;
    setTimeout(typeWriter, 40); // скорость печати
  } else {
    textBlock.innerHTML = message;
  }
}
</script>

</body>
</html>
